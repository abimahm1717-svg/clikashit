<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clika Caps | Contacto</title>
    <!-- Íconos de Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column; /* Alinea los elementos en vertical (menú arriba, formulario abajo) */
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px; /* Espacio al final de la página */
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Navbar / Cabecera */
        header {
            width: 100%; /* Asegura que el menú ocupe todo el ancho */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background-color: #1a1a1a;
            border-bottom: 2px solid #ff3e3e;
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 40px; /* Separa el menú del formulario */
        }

        /* --- ESPACIO PARA EL LOGO EN LA NAVBAR --- */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-placeholder {
            width: 50px;
            height: 50px;
            background-color: #2a2a2a;
            border: 2px solid #ff3e3e;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .logo span {
            color: #ff3e3e;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            font-weight: 600;
            transition: color 0.3s;
        }

        nav ul li a:hover,
        nav ul li a.active {
            color: #ff3e3e;
        }

        .contact-container {
            background-color: #1a1a1a;
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 8px;
            border-top: 4px solid #ff3e3e;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .contact-container h2 {
            text-transform: uppercase;
            font-size: 24px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: center;
        }

        .contact-container h2 span {
            color: #ff3e3e;
        }

        .contact-container p {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Contenedor del Input con Icono */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #666;
            font-size: 16px;
            transition: color 0.3s;
        }

        /* Ajuste específico para el Textarea */
        .input-group.textarea-group i {
            top: 20px;
            transform: none;
        }

        .input-group input, 
        .input-group textarea {
            width: 100%;
            padding: 14px 15px 14px 45px; /* Espacio a la izquierda para el ícono */
            background-color: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group textarea {
            height: 120px;
            resize: none;
        }

        /* Enfoques y Estados Activos */
        .input-group input:focus, 
        .input-group textarea:focus {
            border-color: #ff3e3e;
            box-shadow: 0 0 8px rgba(255, 62, 62, 0.2);
        }

        .input-group input:focus + i, 
        .input-group textarea:focus + i {
            color: #ff3e3e;
        }

        /* Botón de Enviar */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: transparent;
            border: 2px solid #ff3e3e;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background-color: #ff3e3e;
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-placeholder">
                <img src="tt.png" alt="Logo Clika Caps">
            </div>
            <div class="logo">
                <h1>CLIKA<span>CAPS</span></h1>
            </div>
        </div> <!-- Se cerró correctamente el contenedor del logo -->
        
        <nav>
            <ul>
                <li><a href="index.html" >Inicio</a></li>
                <li><a href="catalogo.html">Galería</a></li>
                <li><a href="conocenos.html">Conocenos</a></li>
                <li><a href="vision.html">Visión</a></li>
                <li><a href="redes.html">Redes sociales</a></li>
                <li><a href="probedores.html">Probedores</a></li>
                <li><a href="form.html"class="active">Unete</a></li>
                <li><a href="ubicacion.html">Ubicacion</a></li>
            </ul>                                         
        </nav>
    </header>

    <div class="contact-container">
        <h2>Únete a la poderosa<span>Clika</span></h2>
        <p>Déjanos tus datos y nos pondremos en contacto contigo de inmediato.</p>

        <form action="http://localhost:3000/guardar" method="POST">
            <!-- Campo Nombre -->
            <div class="input-group">
                <input type="text" name="nombre" placeholder="Nombre completo" required>
                <i class="fa-solid fa-user"></i>
            </div>

            <!-- Campo Correo -->
            <div class="input-group">
                <input type="email" name="correo" placeholder="Correo electrónico" required>
                <i class="fa-solid fa-envelope"></i>
            </div>

            <!-- Campo Teléfono -->
            <div class="input-group">
                <input type="tel" name="telefono" placeholder="Número de teléfono (WhatsApp)">
                <i class="fa-solid fa-phone"></i>
            </div>

            <!-- Campo Mensaje -->
            <div class="input-group textarea-group">
                <textarea name="mensaje" placeholder="¿En qué te podemos ayudar? (Dudas, pedidos especiales...)" required></textarea>
                <i class="fa-solid fa-comment-dots"></i>
            </div>

            <!-- Botón -->
            <button type="submit" class="btn-submit">
                Enviar Mensaje <i class="fa-solid fa-paper-plane"></i>
            </button>

        </form>
    </div>

</body>
</html>
